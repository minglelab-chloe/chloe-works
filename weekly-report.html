<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chloe Works</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;font-family:'Nanum Gothic',-apple-system,sans-serif}
:root{
  --sw:220px;
  --bg:#fff;--bg2:#f9f9f8;--bg3:#f1f0ee;--bg4:#e9e8e5;
  --text:#1a1a18;--text2:#6b6b66;--text3:#b0afa8;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --accent:#534AB7;--abg:#EEEDFE;--atext:#3C3489;
  --r:6px;--rl:10px;
  --todo:#6b6b66;--wip:#2563c4;--done:#2d9a5f;--hold:#c26a10;
  --wip-bg:#eff4fd;--done-bg:#edf7f2;--todo-bg:#f1f0ee;--hold-bg:#fdf3e8;
}
body{font-family:'Nanum Gothic',-apple-system,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;display:flex}

/* ── 사이드바 ── */
.sidebar{width:var(--sw);min-height:100vh;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:10}
.sb-logo{padding:22px 18px 16px;border-bottom:1px solid var(--border)}
.sb-logo .title{font-size:16px;font-weight:800;color:var(--text)}
.sb-nav{padding:10px 8px;flex:1;overflow-y:auto}
.nav-sec{margin-bottom:2px}
.nav-sec-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;padding:12px 10px 4px;display:block}
.nav-btn{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--r);font-size:14px;font-weight:700;color:var(--text2);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:background .12s,color .12s}
.nav-btn:hover{background:var(--bg2);color:var(--text)}
.nav-btn.active{background:var(--abg);color:var(--atext)}
.nav-sub{padding-left:8px;max-height:0;overflow:hidden;transition:max-height .25s ease}
.nav-sub.open{max-height:300px}
.nav-sub .nav-btn{font-size:13px;padding:5px 10px}
.chevron{font-size:12px;margin-left:auto;transition:transform .2s;display:inline-block;opacity:.4}
.nav-btn.expanded .chevron{transform:rotate(180deg)}

/* ── 메인 ── */
.main{margin-left:var(--sw);flex:1;min-height:100vh;display:flex;flex-direction:column}
.page{display:none;flex:1;flex-direction:column}
.page.active{display:flex}
.page-head{padding:28px 32px 0;flex-shrink:0}
.page-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px}
.week-badge{font-size:12px;font-weight:700;color:var(--atext);background:var(--abg);padding:3px 12px;border-radius:4px;display:inline-block;margin-bottom:16px}
.page-toolbar{display:flex;align-items:center;justify-content:flex-end;padding:0 32px 16px;flex-shrink:0}
.btn-add{font-size:13px;padding:6px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-weight:700;font-family:inherit;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:background .12s}
.btn-add:hover{background:var(--bg2);color:var(--text)}

/* ── 왼쪽목록 + 오른쪽 미리보기 공통 ── */
.split-wrap{flex:1;display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 120px);background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin:0 32px 32px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.list-panel{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--bg2)}
.list-top{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.list-top-label{font-size:12px;font-weight:700;color:var(--text3)}
.list-body{flex:1;overflow-y:auto;padding:6px}
.list-item{padding:7px 12px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:background .1s}
.list-item:hover{background:var(--bg3)}
.list-item.sel{background:var(--abg);border-color:rgba(83,74,183,.15)}
.list-item-title{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item.sel .list-item-title{color:var(--atext)}
.list-item-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:6px}
.list-item-preview{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prev-panel{display:flex;flex-direction:column;overflow-y:auto;background:var(--bg)}
.prev-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);font-size:13px;gap:10px;padding:2rem}
.prev-empty i{font-size:36px;opacity:.18}
.prev-content{padding:28px 32px}
.prev-header{border-bottom:1px solid var(--border);padding-bottom:14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px}
.prev-title{font-size:20px;font-weight:800;color:var(--text);line-height:1.4}
.prev-meta{font-size:11px;color:var(--text3);margin-top:5px;display:flex;align-items:center;gap:8px}
.prev-actions{display:flex;gap:6px;flex-shrink:0}
.prev-body{font-size:14px;line-height:1.9;white-space:pre-wrap;color:var(--text2)}
.prev-imgs{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.prev-img{max-width:100%;max-height:260px;border-radius:6px;border:1px solid var(--border);object-fit:contain;cursor:pointer}

/* ── 상태 뱃지 ── */
.status-chip{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:700}
.s-todo{background:var(--todo-bg);color:var(--todo)}
.s-wip{background:var(--wip-bg);color:var(--wip)}
.s-done{background:var(--done-bg);color:var(--done)}
.cat-chip{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:700}
.c-crm{background:var(--abg);color:var(--atext)}
.c-learns{background:#edf7f2;color:#2d9a5f}
.c-teach{background:#fdf8e8;color:#a07000}
.c-qa{background:#eff4fd;color:#2563c4}
.c-etc{background:var(--bg3);color:var(--text2)}

/* ── Weekly Report 칸반 ── */
.wr-kanban-wrap{flex:1;overflow-x:auto;padding:0 32px 32px;display:flex;gap:14px;align-items:flex-start}
.wr-col{width:280px;flex-shrink:0}
.wr-col-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--rl) var(--rl) 0 0}
.wr-col-head.todo{background:var(--todo-bg)}
.wr-col-head.wip{background:var(--wip-bg)}
.wr-col-head.done{background:var(--done-bg)}
.wr-col-head.hold{background:var(--hold-bg)}
.col-label{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.col-label.todo{color:var(--todo)}.col-label.todo .col-dot{background:var(--todo)}
.col-label.wip{color:var(--wip)}.col-label.wip .col-dot{background:var(--wip)}
.col-label.done{color:var(--done)}.col-label.done .col-dot{background:var(--done)}
.col-label.hold{color:var(--hold)}.col-label.hold .col-dot{background:var(--hold)}
.col-count{font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px}
.col-count.todo{background:rgba(107,107,102,.1);color:var(--todo)}
.col-count.wip{background:rgba(37,99,196,.1);color:var(--wip)}
.col-count.done{background:rgba(45,154,95,.1);color:var(--done)}
.col-count.hold{background:rgba(194,106,16,.1);color:var(--hold)}
.wr-cards{background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--rl) var(--rl);padding:8px;display:flex;flex-direction:column;gap:6px;min-height:80px}
.wr-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;cursor:pointer;transition:box-shadow .15s,border-color .15s;border-left:3px solid transparent}
.wr-card.todo{border-left-color:var(--todo)}
.wr-card.wip{border-left-color:var(--wip)}
.wr-card.done{border-left-color:var(--done)}
.wr-card.hold{border-left-color:var(--hold)}
.wr-card:hover{border-color:var(--border2);box-shadow:0 2px 10px rgba(0,0,0,.07)}
.wr-card-date{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px}
.wr-card-week{font-size:11px;color:var(--text3);margin-bottom:8px}
.wr-card-progress{font-size:12px;font-weight:700;color:#fff;background:var(--accent);padding:1px 8px;border-radius:4px;display:inline-block;margin-bottom:8px}
.wr-sec{margin-bottom:7px}
.wr-sec-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.wr-sec-body{font-size:12px;color:var(--text2);line-height:1.65;white-space:pre-wrap}
.wr-card-actions{display:none;gap:4px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.wr-card:hover .wr-card-actions{display:flex}
.col-add-btn{width:100%;font-size:12px;padding:7px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;margin-top:4px;border-radius:var(--r);transition:background .1s}
.col-add-btn:hover{background:var(--bg3);color:var(--text2)}
.k-empty{text-align:center;padding:1.5rem .5rem;color:var(--text3);font-size:12px;opacity:.7}

/* ── 공통 ── */
.btn-sm{font-size:11px;padding:3px 8px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:3px;font-family:inherit;transition:background .1s}
.btn-sm:hover{background:var(--bg2);color:var(--text)}
.btn-sm.del:hover{background:#fdf0ef;color:#c0392b;border-color:rgba(192,57,43,.2)}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:12px;line-height:2.4}
.empty i{font-size:28px;display:block;margin-bottom:8px;opacity:.2}

/* ── 모달 ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:100;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:10px;border:1px solid var(--border);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.modal.wide{max-width:660px}
.mh{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:1}
.mh-title{font-size:15px;font-weight:700}
.mclose{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;padding:2px 4px;border-radius:4px;transition:background .1s}
.mclose:hover{background:var(--bg2);color:var(--text)}
.mbody{padding:22px}
.mfoot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--bg)}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em}
.field input,.field select,.field textarea{width:100%;font-size:14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg);color:var(--text);padding:8px 12px;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(83,74,183,.08)}
.field textarea{resize:vertical}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-cancel{font-size:13px;padding:6px 14px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.btn-cancel:hover{background:var(--bg2)}
.btn-save{font-size:13px;padding:6px 16px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:700;font-family:inherit}
.btn-save:hover{opacity:.85}
.sec-block{background:var(--bg2);border-radius:var(--r);padding:12px 16px;margin-bottom:8px}
.sec-block:last-child{margin-bottom:0}
.sec-label{font-size:11px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)}
.sec-content{font-size:14px;line-height:1.75;white-space:pre-wrap;color:var(--text)}
.memo-title-input{width:100%;font-size:17px;font-weight:700;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);padding:4px 0 10px;outline:none;margin-bottom:14px;font-family:inherit}
.memo-title-input::placeholder{color:var(--text3);font-weight:400}
.memo-editor{width:100%;min-height:200px;font-size:14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg2);color:var(--text);padding:12px 14px;outline:none;resize:vertical;line-height:1.8;font-family:inherit}
.memo-editor:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(83,74,183,.08)}
/* ── 메모 툴바 ── */
.memo-toolbar{display:flex;align-items:center;gap:4px;padding:6px 8px;border:1px solid var(--border2);border-bottom:none;border-radius:var(--r) var(--r) 0 0;background:var(--bg);flex-wrap:wrap}
.memo-toolbar + .wo-desc-editor{border-radius:0 0 var(--r) var(--r)}
.tb-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:1px solid transparent;border-radius:4px;background:transparent;cursor:pointer;color:var(--text2);font-size:13px;font-family:inherit;transition:background .1s,border-color .1s;flex-shrink:0}
.tb-btn:hover{background:var(--bg3);border-color:var(--border2);color:var(--text)}
.tb-btn.active{background:var(--abg);border-color:rgba(83,74,183,.3);color:var(--atext)}
.tb-sep{width:1px;height:18px;background:var(--border2);margin:0 2px;flex-shrink:0}
.tb-size-select{font-size:12px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--text2);padding:2px 4px;cursor:pointer;font-family:inherit;height:28px;outline:none}
.tb-size-select:focus{border-color:var(--accent)}
.wo-desc-editor{width:100%;min-height:200px;font-size:14px;border-radius:0 0 var(--r) var(--r);border:1px solid var(--border2);background:var(--bg2);color:var(--text);padding:12px 14px;outline:none;line-height:1.8;font-family:inherit;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
.wo-desc-editor:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(83,74,183,.08)}
.wo-desc-editor:empty::before{content:attr(data-placeholder);color:var(--text3);pointer-events:none}
.img-upload-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:6px 12px;border-radius:var(--r);border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;margin-top:10px;transition:background .1s}
.img-upload-btn:hover{background:var(--bg2);color:var(--text2)}
.img-preview-area{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.img-preview-item{position:relative}
.img-preview-item img{width:72px;height:72px;object-fit:cover;border-radius:4px;border:1px solid var(--border);display:block}
.img-preview-item .rm{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:#c0392b;color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:24px}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:90vh;border-radius:8px;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.lb-close{position:fixed;top:16px;right:20px;background:rgba(0,0,0,.3);border:none;color:#fff;font-size:20px;cursor:pointer;padding:6px 10px;border-radius:6px}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sb-logo"><div class="title">Chloe Works</div></div>
  <div class="sb-nav">
    <div class="nav-sec">
      <span class="nav-sec-label">Report</span>
      <button class="nav-btn active" onclick="showPage('weekly',this)">📋 Weekly Report</button>
    </div>
    <div class="nav-sec">
      <span class="nav-sec-label">Works</span>
      <button class="nav-btn" onclick="showPage('works-all',this);toggleWorks(document.getElementById('nav-aw'))">
        📂 All Works
      </button>
      <div class="nav-sub" id="worksSub">
        <button class="nav-btn" onclick="showPage('works-crm',this)">📊 Sales CRM</button>
        <button class="nav-btn" onclick="showPage('works-learns',this)">📚 Learns</button>
        <button class="nav-btn" onclick="showPage('works-qa',this)">✅ QA</button>
        <button class="nav-btn" onclick="showPage('works-etc',this)">🔖 Etc</button>
      </div>
    </div>
  </div>
</nav>

<main class="main">

  <!-- Weekly Report -->
  <div class="page active" id="page-weekly">
    <div class="page-head">
      <div class="page-title">📋 Weekly Report</div>
      <div class="week-badge" id="weekLabel"></div>
    </div>
    <div class="page-toolbar">
      <button class="btn-add" onclick="openWR(null)"><i class="ti ti-plus"></i> 보고서 작성</button>
    </div>
    <div class="wr-kanban-wrap" id="wrKanban"></div>
  </div>

  <!-- All Works — 전체 목록 -->
  <div class="page" id="page-works-all">
    <div class="page-head"><div class="page-title">📂 All Works</div></div>
    <div class="page-toolbar">
      <button class="btn-add" onclick="openWork(null,'')"><i class="ti ti-plus"></i> 업무 추가</button>
    </div>
    <div class="split-wrap">
      <div class="list-panel">
        <div class="list-top"><span class="list-top-label">전체 목록</span></div>
        <div class="list-body" id="list-all"></div>
      </div>
      <div class="prev-panel" id="prev-all">
        <div class="prev-empty"><i class="ti ti-layout-sidebar-right-expand"></i>항목을 선택하면 내용이 표시돼요</div>
      </div>
    </div>
  </div>

  <!-- Sales CRM -->
  <div class="page" id="page-works-crm">
    <div class="page-head"><div class="page-title" style="color:#534AB7">📊 Sales CRM</div></div>
    <div class="page-toolbar">
      <button class="btn-add" onclick="openWork(null,'Sales CRM')"><i class="ti ti-plus"></i> 업무 추가</button>
    </div>
    <div class="split-wrap">
      <div class="list-panel">
        <div class="list-top"><span class="list-top-label">목록</span></div>
        <div class="list-body" id="list-crm"></div>
      </div>
      <div class="prev-panel" id="prev-crm">
        <div class="prev-empty"><i class="ti ti-layout-sidebar-right-expand"></i>항목을 선택하면 내용이 표시돼요</div>
      </div>
    </div>
  </div>

  <!-- Learns -->
  <div class="page" id="page-works-learns">
    <div class="page-head"><div class="page-title" style="color:#2d9a5f">📚 Learns</div></div>
    <div class="page-toolbar">
      <button class="btn-add" onclick="openWork(null,'Learns')"><i class="ti ti-plus"></i> 업무 추가</button>
    </div>
    <div class="split-wrap">
      <div class="list-panel">
        <div class="list-top"><span class="list-top-label">목록</span></div>
        <div class="list-body" id="list-learns"></div>
      </div>
      <div class="prev-panel" id="prev-learns">
        <div class="prev-empty"><i class="ti ti-layout-sidebar-right-expand"></i>항목을 선택하면 내용이 표시돼요</div>
      </div>
    </div>
  </div>

  <!-- QA -->
  <div class="page" id="page-works-qa">
    <div class="page-head"><div class="page-title" style="color:#2563c4">✅ QA</div></div>
    <div class="page-toolbar">
      <button class="btn-add" onclick="openWork(null,'QA')"><i class="ti ti-plus"></i> 업무 추가</button>
    </div>
    <div class="split-wrap">
      <div class="list-panel">
        <div class="list-top"><span class="list-top-label">목록</span></div>
        <div class="list-body" id="list-qa"></div>
      </div>
      <div class="prev-panel" id="prev-qa">
        <div class="prev-empty"><i class="ti ti-layout-sidebar-right-expand"></i>항목을 선택하면 내용이 표시돼요</div>
      </div>
    </div>
  </div>

  <!-- Etc -->
  <div class="page" id="page-works-etc">
    <div class="page-head"><div class="page-title" style="color:#c26a10">🔖 Etc</div></div>
    <div class="page-toolbar">
      <button class="btn-add" onclick="openWork(null,'Etc')"><i class="ti ti-plus"></i> 업무 추가</button>
    </div>
    <div class="split-wrap">
      <div class="list-panel">
        <div class="list-top"><span class="list-top-label">목록</span></div>
        <div class="list-body" id="list-etc"></div>
      </div>
      <div class="prev-panel" id="prev-etc">
        <div class="prev-empty"><i class="ti ti-layout-sidebar-right-expand"></i>항목을 선택하면 내용이 표시돼요</div>
      </div>
    </div>
  </div>

</main>

<!-- Weekly Report 작성 모달 -->
<div class="overlay" id="wrWriteOv">
  <div class="modal">
    <div class="mh"><span class="mh-title" id="wrWriteTitle">주간 보고 작성</span><button class="mclose" onclick="closeWR()"><i class="ti ti-x"></i></button></div>
    <div class="mbody">
      <div class="field-row">
        <div class="field"><label>진행률 (%)</label><input type="number" id="wf-progress" min="0" max="100" placeholder="0 ~ 100"/></div>
        <div class="field"><label>상태</label>
          <select id="wf-status">
            <option value="todo">예정</option>
            <option value="wip">진행 중</option>
            <option value="done">완료</option>
            <option value="hold">보류</option>
          </select>
        </div>
      </div>
      <div class="field"><label>완료 업무</label><textarea id="wf-done" style="min-height:80px" placeholder="이번 주 완료한 업무"></textarea></div>
      <div class="field"><label>진행 중</label><textarea id="wf-wip" style="min-height:64px" placeholder="현재 진행 중인 업무"></textarea></div>
      <div class="field"><label>이슈 / 특이사항</label><textarea id="wf-issue" style="min-height:56px" placeholder="문제, 블로커, 이슈"></textarea></div>
      <div class="field"><label>다음 주 계획</label><textarea id="wf-next" style="min-height:64px" placeholder="다음 주 예정 업무"></textarea></div>
    </div>
    <div class="mfoot"><button class="btn-cancel" onclick="closeWR()">취소</button><button class="btn-save" onclick="saveWR()">저장</button></div>
  </div>
</div>

<!-- Weekly Report 상세 모달 -->
<div class="overlay" id="wrDetailOv">
  <div class="modal">
    <div class="mh">
      <div><div style="font-size:14px;font-weight:700" id="wd-date"></div><div style="font-size:11px;color:var(--text3)" id="wd-week"></div></div>
      <button class="mclose" onclick="closeWRDetail()"><i class="ti ti-x"></i></button>
    </div>
    <div class="mbody">
      <div class="sec-block"><div class="sec-label" style="color:#2d9a5f"><i class="ti ti-circle-check"></i> 완료 업무</div><div class="sec-content" id="wd-done"></div></div>
      <div class="sec-block"><div class="sec-label" style="color:#2563c4"><i class="ti ti-loader"></i> 진행 중</div><div class="sec-content" id="wd-wip"></div></div>
      <div class="sec-block" id="wd-issue-bl"><div class="sec-label" style="color:#c0392b"><i class="ti ti-alert-triangle"></i> 이슈</div><div class="sec-content" id="wd-issue"></div></div>
      <div class="sec-block"><div class="sec-label" style="color:#c26a10"><i class="ti ti-calendar-event"></i> 다음 주 계획</div><div class="sec-content" id="wd-next"></div></div>
    </div>
  </div>
</div>

<!-- Works 작성 모달 -->
<div class="overlay" id="workWriteOv">
  <div class="modal wide">
    <div class="mh"><span class="mh-title" id="workWriteTitle">업무 추가</span><button class="mclose" onclick="closeWork()"><i class="ti ti-x"></i></button></div>
    <div class="mbody">
      <div class="field-row">
        <div class="field"><label>업무명 *</label><input type="text" id="wo-title" placeholder="업무 제목"/></div>
        <div class="field"><label>카테고리</label>
          <select id="wo-cat">
            <option value="Sales CRM">Sales CRM</option>
            <option value="Learns">Learns</option>
            <option value="Learns Teachers">Learns Teachers</option>
            <option value="QA">QA</option>
            <option value="Etc">Etc</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>내용 / 메모</label>
        <div class="memo-toolbar" id="memo-toolbar">
          <button type="button" class="tb-btn" id="tb-bold" title="굵게 (Ctrl+B)" onclick="tbCmd('bold')"><b>B</b></button>
          <button type="button" class="tb-btn" id="tb-italic" title="기울임 (Ctrl+I)" onclick="tbCmd('italic')"><i>I</i></button>
          <button type="button" class="tb-btn" id="tb-underline" title="밑줄 (Ctrl+U)" onclick="tbCmd('underline')"><u>U</u></button>
          <div class="tb-sep"></div>
          <select class="tb-size-select" id="tb-size" title="글자 크기" onchange="tbFontSize(this.value)">
            <option value="">크기</option>
            <option value="1">10px</option>
            <option value="2">13px</option>
            <option value="3">16px</option>
            <option value="4">18px</option>
            <option value="5">24px</option>
            <option value="6">32px</option>
          </select>
          <div class="tb-sep"></div>
          <button type="button" class="tb-btn" title="왼쪽 정렬" onclick="tbCmd('justifyLeft')"><i class="ti ti-align-left"></i></button>
          <button type="button" class="tb-btn" title="가운데 정렬" onclick="tbCmd('justifyCenter')"><i class="ti ti-align-center"></i></button>
          <button type="button" class="tb-btn" title="오른쪽 정렬" onclick="tbCmd('justifyRight')"><i class="ti ti-align-right"></i></button>
          <div class="tb-sep"></div>
          <button type="button" class="tb-btn" title="형식 지우기" onclick="tbCmd('removeFormat')"><i class="ti ti-clear-formatting"></i></button>
        </div>
        <div id="wo-desc" class="wo-desc-editor" contenteditable="true" data-placeholder="내용을 자유롭게 적어요" style="min-height:200px" oninput="updateTbState()" onkeyup="updateTbState()" onmouseup="updateTbState()"></div>
      </div>
      <label class="img-upload-btn" for="wo-img-input"><i class="ti ti-photo-plus"></i> 이미지 추가</label>
      <input type="file" id="wo-img-input" accept="image/*" multiple style="display:none"/>
      <div class="img-preview-area" id="wo-img-preview"></div>
    </div>
    <div class="mfoot"><button class="btn-cancel" onclick="closeWork()">취소</button><button class="btn-save" onclick="saveWork()">저장</button></div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLB()">
  <button class="lb-close" onclick="closeLB()"><i class="ti ti-x"></i></button>
  <img id="lb-img" src="" alt=""/>
</div>

<script>
function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function weekLabel(){var n=new Date(),dow=(n.getDay()+6)%7,m=new Date(n);m.setDate(n.getDate()-dow);var s=new Date(m);s.setDate(m.getDate()+6);var f=function(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};return f(m)+' ~ '+f(s)}
function loadLS(k){try{return JSON.parse(localStorage.getItem(k)||'[]')}catch(e){return[]}}
function saveLS(k,v){localStorage.setItem(k,JSON.stringify(v))}
function openLB(src){document.getElementById('lb-img').src=src;document.getElementById('lightbox').classList.add('open')}
function closeLB(){document.getElementById('lightbox').classList.remove('open')}
document.getElementById('weekLabel').textContent=weekLabel();

var CAT_CLS={'Sales CRM':'c-crm','Learns':'c-learns','Learns Teachers':'c-teach','QA':'c-qa','Etc':'c-etc'};
var CAT_KEY={'Sales CRM':'crm','Learns':'learns','Learns Teachers':'learns','QA':'qa','Etc':'etc'};
var STATUS_LABEL={todo:'예정',wip:'진행 중',done:'완료',hold:'보류'};
var STATUS_CLS={todo:'s-todo',wip:'s-wip',done:'s-done',hold:'s-todo'};
var WR_COLS=[{key:'todo',label:'예정',cls:'todo'},{key:'wip',label:'진행 중',cls:'wip'},{key:'done',label:'완료',cls:'done'},{key:'hold',label:'보류',cls:'hold'}];

/* ── 페이지 전환 ── */
function showPage(id,el){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active')});
  if(el)el.classList.add('active');
  if(id==='weekly') renderWR();
  else if(id==='works-all'){renderAllList()}
  else if(id.indexOf('works-')===0){
    var key=id.replace('works-','');
    renderWorkList(key);
  }
}
function toggleWorks(){
  document.getElementById('worksSub').classList.toggle('open');
}
// All Works 클릭 시 하위 메뉴 자동 열기
document.querySelector('[onclick*="works-all"]').addEventListener('click',function(){
  document.getElementById('worksSub').classList.add('open');
});

/* ══ WEEKLY REPORT ══ */
var wrList=loadLS('cw-wr'),wrNextId=wrList.length?Math.max.apply(null,wrList.map(function(r){return r.id}))+1:1,wrEdit=null;
function renderWR(){
  var wrap=document.getElementById('wrKanban');wrap.innerHTML='';
  WR_COLS.forEach(function(col){
    var items=wrList.filter(function(r){return(r.status||'todo')===col.key});
    var colEl=document.createElement('div');colEl.className='wr-col';
    var head=document.createElement('div');head.className='wr-col-head '+col.cls;
    head.innerHTML='<div class="col-label '+col.cls+'"><div class="col-dot"></div>'+col.label+'</div><span class="col-count '+col.cls+'">'+items.length+'</span>';
    colEl.appendChild(head);
    var cards=document.createElement('div');cards.className='wr-cards';
    if(!items.length){cards.innerHTML='<div class="k-empty">없음</div>'}
    else{items.forEach(function(r){
      var card=document.createElement('div');card.className='wr-card '+col.cls;
      var prog=r.progress!=null&&r.progress!==''?'<div class="wr-card-progress">'+r.progress+'%</div>':'';
      card.innerHTML='<div class="wr-card-date">'+r.date+'</div><div class="wr-card-week">'+r.wl+'</div>'+prog
        +(r.done?'<div class="wr-sec"><div class="wr-sec-label" style="color:#2d9a5f"><i class="ti ti-circle-check"></i> 완료</div><div class="wr-sec-body">'+r.done+'</div></div>':'')
        +(r.wip?'<div class="wr-sec"><div class="wr-sec-label" style="color:#2563c4"><i class="ti ti-loader"></i> 진행 중</div><div class="wr-sec-body">'+r.wip+'</div></div>':'')
        +(r.next?'<div class="wr-sec"><div class="wr-sec-label" style="color:#c26a10"><i class="ti ti-calendar-event"></i> 다음 주</div><div class="wr-sec-body">'+r.next+'</div></div>':'')
        +'<div class="wr-card-actions"><button class="btn-sm" onclick="openWR('+r.id+')"><i class="ti ti-edit"></i> 수정</button><button class="btn-sm del" onclick="delWR('+r.id+')"><i class="ti ti-trash"></i> 삭제</button></div>';
      cards.appendChild(card);
    })}
    var ab=document.createElement('button');ab.className='col-add-btn';ab.innerHTML='<i class="ti ti-plus"></i> 추가';
    ab.onclick=function(){openWR(null,col.key)};
    colEl.appendChild(cards);colEl.appendChild(ab);wrap.appendChild(colEl);
  });
}
function openWR(id,def){
  wrEdit=id;
  document.getElementById('wrWriteTitle').textContent=id?'주간 보고 수정':'주간 보고 작성';
  if(id){var r=wrList.find(function(x){return x.id===id});document.getElementById('wf-progress').value=r.progress!=null?r.progress:'';document.getElementById('wf-status').value=r.status||'todo';document.getElementById('wf-done').value=r.done||'';document.getElementById('wf-wip').value=r.wip||'';document.getElementById('wf-issue').value=r.issue=='없음'?'':r.issue||'';document.getElementById('wf-next').value=r.next||'';}
  else{['done','wip','issue','next'].forEach(function(f){document.getElementById('wf-'+f).value=''});document.getElementById('wf-progress').value='';document.getElementById('wf-status').value=def||'todo';}
  document.getElementById('wrWriteOv').classList.add('open');
}
function closeWR(){document.getElementById('wrWriteOv').classList.remove('open');wrEdit=null}
function saveWR(){
  var done=document.getElementById('wf-done').value.trim();
  var entry={id:wrEdit||wrNextId++,date:todayStr(),wl:weekLabel(),status:document.getElementById('wf-status').value,progress:document.getElementById('wf-progress').value!==''?parseInt(document.getElementById('wf-progress').value):null,done:done,wip:document.getElementById('wf-wip').value.trim(),issue:document.getElementById('wf-issue').value.trim()||'없음',next:document.getElementById('wf-next').value.trim()};
  if(wrEdit){var i=wrList.findIndex(function(x){return x.id===wrEdit});if(i>-1)wrList[i]=entry}else{wrList.unshift(entry)}
  saveLS('cw-wr',wrList);closeWR();renderWR();
}
function delWR(id){if(!confirm('삭제할까요?'))return;wrList=wrList.filter(function(x){return x.id!==id});saveLS('cw-wr',wrList);renderWR()}
function closeWRDetail(){document.getElementById('wrDetailOv').classList.remove('open')}

/* ══ WORKS ══ */
var wkList=loadLS('cw-wk'),wkNextId=wkList.length?Math.max.apply(null,wkList.map(function(w){return w.id}))+1:1,wkEdit=null,wkImgs=[];
var wkSel={all:null,crm:null,learns:null,qa:null,etc:null};

function renderAllList(){
  renderList('all', wkList);
  if(wkSel.all) showPreview('all', wkSel.all);
}
function renderWorkList(key){
  var cats={crm:['Sales CRM'],learns:['Learns','Learns Teachers'],qa:['QA'],etc:['Etc']};
  var filtered=wkList.filter(function(w){return cats[key]&&cats[key].indexOf(w.cat)>-1});
  renderList(key, filtered);
  if(wkSel[key]) showPreview(key, wkSel[key]);
}
function renderList(key, list){
  var el=document.getElementById('list-'+key);if(!el)return;
  if(!list.length){el.innerHTML='<div class="empty"><i class="ti ti-clipboard"></i>등록된 업무가 없어요.</div>';return}
  el.innerHTML=list.map(function(w){
    var sel=wkSel[key]===w.id;
    return '<div class="list-item'+(sel?' sel':'')+'" onclick="selWork(\''+key+'\','+w.id+')">'
      +'<div class="list-item-title">'+w.title+'</div>'
      +'<div class="list-item-meta"><span class="cat-chip '+(CAT_CLS[w.cat]||'c-etc')+'">'+w.cat+'</span><span>'+w.date+'</span></div>'
      +(w.desc?'<div class="list-item-preview">'+w.desc.replace(/<[^>]*>/g,'').split('\n')[0]+'</div>':'')
      +'</div>'
  }).join('');
}
function selWork(key, id){
  wkSel[key]=id;
  var cats={crm:['Sales CRM'],learns:['Learns','Learns Teachers'],qa:['QA'],etc:['Etc']};
  var list=key==='all'?wkList:wkList.filter(function(w){return cats[key]&&cats[key].indexOf(w.cat)>-1});
  renderList(key, list);
  showPreview(key, id);
}
function showPreview(key, id){
  var panel=document.getElementById('prev-'+key);if(!panel)return;
  if(!id){panel.innerHTML='<div class="prev-empty"><i class="ti ti-layout-sidebar-right-expand"></i>항목을 선택하면 내용이 표시돼요</div>';return}
  var w=wkList.find(function(x){return x.id===id});if(!w)return;
  var wrap=document.createElement('div');wrap.className='prev-content';
  var hd=document.createElement('div');hd.className='prev-header';
  var tBlock=document.createElement('div');
  var tEl=document.createElement('div');tEl.className='prev-title';tEl.textContent=w.title;
  var mEl=document.createElement('div');mEl.className='prev-meta';
  var chip=document.createElement('span');chip.className='cat-chip '+(CAT_CLS[w.cat]||'c-etc');chip.textContent=w.cat;
  var dEl=document.createElement('span');dEl.textContent=w.date;
  mEl.appendChild(chip);mEl.appendChild(dEl);
  tBlock.appendChild(tEl);tBlock.appendChild(mEl);
  var acts=document.createElement('div');acts.className='prev-actions';
  var eBtn=document.createElement('button');eBtn.className='btn-sm';eBtn.innerHTML='<i class="ti ti-edit"></i> 수정';eBtn.onclick=function(){openWork(w.id,w.cat)};
  var dBtn=document.createElement('button');dBtn.className='btn-sm del';dBtn.innerHTML='<i class="ti ti-trash"></i> 삭제';dBtn.onclick=function(){delWork(w.id,key)};
  acts.appendChild(eBtn);acts.appendChild(dBtn);
  hd.appendChild(tBlock);hd.appendChild(acts);wrap.appendChild(hd);
  var body=document.createElement('div');body.className='prev-body';body.innerHTML=w.desc||'내용 없음';
  wrap.appendChild(body);
  if(w.imgs&&w.imgs.length){
    var imgWrap=document.createElement('div');imgWrap.className='prev-imgs';
    w.imgs.forEach(function(src){var img=document.createElement('img');img.className='prev-img';img.src=src;img.onclick=function(){openLB(src)};imgWrap.appendChild(img)});
    wrap.appendChild(imgWrap);
  }
  panel.innerHTML='';panel.appendChild(wrap);
}
function openWork(id,cat){
  wkEdit=id;wkImgs=[];
  document.getElementById('workWriteTitle').textContent=id?'업무 수정':'업무 추가';
  if(id){var w=wkList.find(function(x){return x.id===id});document.getElementById('wo-title').value=w.title||'';document.getElementById('wo-cat').value=w.cat||'Sales CRM';document.getElementById('wo-desc').innerHTML=w.desc||'';wkImgs=w.imgs?w.imgs.slice():[];}
  else{document.getElementById('wo-title').value='';document.getElementById('wo-cat').value=cat||'Sales CRM';document.getElementById('wo-desc').innerHTML='';}
  renderWkImgPreview();
  document.getElementById('workWriteOv').classList.add('open');
}
function closeWork(){document.getElementById('workWriteOv').classList.remove('open');wkEdit=null;wkImgs=[]}
function renderWkImgPreview(){
  document.getElementById('wo-img-preview').innerHTML=wkImgs.map(function(src,i){
    return '<div class="img-preview-item"><img src="'+src+'" /><button class="rm" onclick="rmWkImg('+i+')">×</button></div>'
  }).join('');
}
function rmWkImg(i){wkImgs.splice(i,1);renderWkImgPreview()}
document.getElementById('wo-img-input').onchange=function(e){
  Array.from(e.target.files).forEach(function(f){var r=new FileReader();r.onload=function(ev){wkImgs.push(ev.target.result);renderWkImgPreview()};r.readAsDataURL(f)});e.target.value='';
};
function saveWork(){
  var title=document.getElementById('wo-title').value.trim();
  if(!title){alert('업무명은 필수입니다.');return}
  var cat=document.getElementById('wo-cat').value;
  var entry={id:wkEdit||wkNextId++,title:title,cat:cat,desc:document.getElementById('wo-desc').innerHTML.trim(),imgs:wkImgs.slice(),date:todayStr()};
  if(wkEdit){var i=wkList.findIndex(function(x){return x.id===wkEdit});if(i>-1)wkList[i]=entry}else{wkList.unshift(entry)}
  saveLS('cw-wk',wkList);
  var key=CAT_KEY[cat]||'etc';
  wkSel[key]=entry.id;wkSel.all=entry.id;
  closeWork();
  var activePage=document.querySelector('.page.active');
  if(activePage){
    var pid=activePage.id.replace('page-works-','');
    if(pid==='all')renderAllList();else renderWorkList(pid);
  }
}
function delWork(id,key){
  if(!confirm('삭제할까요?'))return;
  wkList=wkList.filter(function(x){return x.id!==id});
  saveLS('cw-wk',wkList);
  wkSel[key]=null;wkSel.all=null;
  if(key==='all')renderAllList();else renderWorkList(key);
  showPreview(key,null);
}

['wrWriteOv','wrDetailOv','workWriteOv'].forEach(function(id){
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')});
});

/* ══ 메모 툴바 ══ */
function tbCmd(cmd){
  document.getElementById('wo-desc').focus();
  document.execCommand(cmd,false,null);
  updateTbState();
}
function tbFontSize(val){
  if(!val)return;
  document.getElementById('wo-desc').focus();
  document.execCommand('fontSize',false,val);
  updateTbState();
}
function updateTbState(){
  var cmds=['bold','italic','underline'];
  var ids=['tb-bold','tb-italic','tb-underline'];
  cmds.forEach(function(c,i){
    var btn=document.getElementById(ids[i]);
    if(btn){
      if(document.queryCommandState(c))btn.classList.add('active');
      else btn.classList.remove('active');
    }
  });
}

renderWR();
</script>
</body>
</html>
